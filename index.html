const IS_CONFIGURED =

const isAllowed = email => {
  const e = email.toLowerCase();
  if (CONFIG.ALLOWED_EMAILS.map(x => x.toLowerCase()).includes(e)) return true;
  const domain = e.split("@")[1];
  return CONFIG.ALLOWED_DOMAINS.map(x => x.toLowerCase()).includes(domain);
};

const parseJWT = token => {
  try {
    return JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));

// ── Helpers ───────────────────────────────────────────────────────────────

const fmtDate  = s => s ? s.split("-").reverse().join("/") : "—";

const diasAbierto = (fecha, estado) => {
  if (!fecha) return null;
  if (estado === "Resuelto" || estado === "Rechazado") return "cerrado";
  return Math.floor((new Date() - new Date(fecha)) / 86400000);
};

// ── Sesión (localStorage con fallback en memoria) ──────────────────────────
const SESSION_KEY = "garantapp_session_v1";
const _mem = {};
const store = {
  get: k => { try { return localStorage.getItem(k); } catch { return _mem[k] ?? null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { _mem[k] = v; } },
  del: k => { try { localStorage.removeItem(k); } catch { delete _mem[k]; } },
};
const loadSession = async () => {
  try { const r = store.get(SESSION_KEY); if (!r) return null; const s = JSON.parse(r); return s.expiresAt > Date.now() ? s : null; }
  catch { return null; }
};
const saveSession  = async s => store.set(SESSION_KEY, JSON.stringify(s));
const clearSession = async () => store.del(SESSION_KEY);

// ── Datos (Google Sheets vía Apps Script Web App) ──────────────────────────
const API_OK = CONFIG.WEBAPP_URL && !CONFIG.WEBAPP_URL.startsWith("REEMPLAZAR");

function currentToken() {
  try { const r = store.get(SESSION_KEY); return r ? JSON.parse(r).session : null; }
  catch { return null; }
}
async function apiAuth(credential) {
  const res = await fetch(CONFIG.WEBAPP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action: "auth", credential: credential }),
  });
  return res.json();
}
async function apiCall(payload) {
  // text/plain evita el preflight CORS que Apps Script no maneja
  const res = await fetch(CONFIG.WEBAPP_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ ...payload, session: currentToken() }),
  });
  const d = await res.json();
  if (d.needsLogin) { await clearSession(); throw new Error("SESSION_EXPIRED"); }
  if (!d.ok) throw new Error(d.error || "Error de la API");
  return d;
}
async function apiList() {
  const d = await apiCall({ action: "list" });
  return d.records || [];
}

//  PANTALLA DE LOGIN
// ═══════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [error, setError]   = useState("");
  const [ready, setReady]   = useState(false);
  const [waiting, setWaiting] = useState(false);
  const btnRef  = useRef(null);
  const cbRef   = useRef(null);

  cbRef.current = useCallback(async response => {
    setError(""); setWaiting(true);
    try {
      const r = await apiAuth(response.credential);
      if (!r.ok) { setError(r.error || "Acceso no autorizado."); setWaiting(false); return; }
      onLogin({ session: r.session, email: r.user.email, name: r.user.name,
        picture: r.user.picture, expiresAt: r.user.exp });
    } catch (e) {
      setError("No se pudo validar con el servidor. Verificá tu conexión e intentá de nuevo.");
      setWaiting(false);
    }
  }, [onLogin]);

  // Paso 1: cargar el script de Google una sola vez
  useEffect(() => {
    if (window.google && window.google.accounts && window.google.accounts.id) { setReady(true); return; }
    const ex = document.getElementById("gsi-script");
    if (ex) { ex.addEventListener("load", () => setReady(true)); return; }
    const script = document.createElement("script");
    script.id = "gsi-script";
    script.src = "https://accounts.google.com/gsi/client";
    script.async = true;
    script.onload = () => setReady(true);
    script.onerror = () => setError("No se pudo cargar Google. Revisá tu conexión o si hay un bloqueador de anuncios activo.");
    document.head.appendChild(script);
  }, []);

  // Paso 2: dibujar el boton cuando el script esta listo y el contenedor existe
  useEffect(() => {
    if (!ready || !btnRef.current) return;
    try {
      window.google.accounts.id.initialize({
        client_id: CONFIG.CLIENT_ID,
        callback: r => cbRef.current(r),
        auto_select: false,
      });
      window.google.accounts.id.renderButton(btnRef.current, {
        theme: "filled_blue", size: "large", text: "signin_with",
        shape: "pill", logo_alignment: "left", width: 280,
      });
    } catch (e) {
      setError("No se pudo inicializar el login de Google: " + (e && e.message ? e.message : e));
    }
  }, [ready]);

  return (
    <div style={{ minHeight: "100vh",
      background: "linear-gradient(135deg,#0C1526 0%,#1A2D4F 50%,#0C1526 100%)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: 24, fontFamily: "'DM Sans',system-ui,sans-serif" }}>

      {/* Decorative circles */}
      <div style={{ position: "fixed", width: 400, height: 400, borderRadius: "50%",
        background: "radial-gradient(circle,rgba(37,99,235,.15) 0%,transparent 70%)",
        top: "10%", left: "10%", pointerEvents: "none" }} />
      <div style={{ position: "fixed", width: 300, height: 300, borderRadius: "50%",
        background: "radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 70%)",
        bottom: "15%", right: "15%", pointerEvents: "none" }} />

      <div style={{ position: "relative", background: "rgba(255,255,255,.04)",
        backdropFilter: "blur(20px)", borderRadius: 24,
        border: "1px solid rgba(255,255,255,.1)",
        padding: "48px 44px", width: "100%", maxWidth: 420, textAlign: "center",
        boxShadow: "0 30px 60px rgba(0,0,0,.4)" }}>

        {/* Logo */}
        <div style={{ width: 72, height: 72, borderRadius: 20,
          background: "linear-gradient(135deg,#2563EB,#7C3AED)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 32, margin: "0 auto 20px",
          boxShadow: "0 8px 24px rgba(37,99,235,.4)" }}>🛡️</div>

        <h1 style={{ margin: "0 0 6px", fontSize: 24, fontWeight: 900,
          color: "#fff", letterSpacing: "-.03em" }}>GarantApp</h1>
        <p style={{ margin: "0 0 32px", fontSize: 13, color: "#64748B" }}>
          Iniciá sesión con tu cuenta de Google de bitek
        </p>

        {/* Botón de Google — el contenedor SIEMPRE está montado */}
        {!ready && !error && (
          <div style={{ color: "#475569", fontSize: 13, marginBottom: 10 }}>Cargando Google…</div>
        )}
        <div ref={btnRef} style={{ display: "flex", justifyContent: "center", minHeight: 44 }} />
        {waiting && (
          <div style={{ marginTop: 12, color: "#60A5FA", fontSize: 13, fontWeight: 600 }}>⟳ Validando acceso…</div>
        )}

        {/* Error */}
        {error && (
          <div style={{ marginTop: 16, padding: "10px 14px", borderRadius: 10,
            background: "rgba(244,63,94,.15)", border: "1px solid rgba(244,63,94,.3)",
            color: "#FCA5A5", fontSize: 12, lineHeight: 1.5 }}>
            ⚠️ {error}
          </div>
        )}

        <p style={{ marginTop: 28, fontSize: 11, color: "#334155", lineHeight: 1.6 }}>
          Solo los usuarios autorizados por el administrador<br />pueden acceder a esta herramienta.
        </p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  AUTH GATE
// ═══════════════════════════════════════════════════════════════════════════
function AuthGate({ children }) {
  const [user, setUser]       = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    loadSession().then(s => { setUser(s); setLoading(false); });
  }, []);

  const handleLogin = useCallback(async session => {
    await saveSession(session);
    setUser(session);
  }, []);

  const handleLogout = useCallback(async () => {
    await clearSession();
    if (window.google?.accounts?.id) window.google.accounts.id.disableAutoSelect();
    setUser(null);
  }, []);

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center",
      height: "100vh", background: "#0C1526", fontFamily: "system-ui", color: "#475569", gap: 10 }}>
      <span style={{ fontSize: 22 }}>⏳</span> Verificando sesión…
    </div>
  );
  if (!IS_CONFIGURED) return <SetupScreen />;
  if (!user) return <LoginScreen onLogin={handleLogin} />;
  return children({ user, onLogout: handleLogout });
}

        <div><Label text="Costo Envío ($)" /><input type="number" style={inputCls} value={f.costoEnvio} onChange={set("costoEnvio")} placeholder="0" /></div>
        <div><Label text="Precio Producto ($)" /><input type="number" style={inputCls} value={f.precioProducto} onChange={set("precioProducto")} placeholder="0" /></div>
      </Section>

      <Section icon="📍" title="Contacto y Envío">
        <div><Label text="Teléfono" /><input style={inputCls} value={f.telefono} onChange={set("telefono")} placeholder="+54 11…" /></div>
        <div><Label text="Email" /><input type="email" style={inputCls} value={f.mail} onChange={set("mail")} placeholder="cliente@mail.com" /></div>
        <div style={fw}><Label text="Dirección" /><input style={inputCls} value={f.direccion} onChange={set("direccion")} placeholder="Calle, número, localidad" /></div>
        <div><Label text="Código Postal" /><input style={inputCls} value={f.codigoPostal} onChange={set("codigoPostal")} placeholder="1414" /></div>
        <div style={fw}><Label text="Notas adicionales" /><textarea style={{...inputCls,minHeight:54,resize:"vertical"}} value={f.notas} onChange={set("notas")} placeholder="Fotos, tracking, observaciones…" /></div>
      </Section>
    </div>

    <div style={{ padding: "16px 28px 24px", display: "flex", gap: 10,
      justifyContent: "flex-end", borderTop: "1px solid #F1F5F9" }}>
      <button onClick={onClose} style={{ padding: "10px 20px", borderRadius: 9,
        border: "1.5px solid #E2E8F0", background: "#fff", color: "#64748B",
        fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Cancelar</button>
      <button onClick={() => ok && onSave(f)} style={{ padding: "10px 24px", borderRadius: 9,
        border: "none", background: ok ? "#2563EB" : "#CBD5E1", color: "#fff",
        fontSize: 13, fontWeight: 700, cursor: ok ? "pointer" : "not-allowed", fontFamily: "inherit" }}>
        {initial ? "Guardar cambios" : "Agregar caso"}
      </button>
    </div>
  </>;
}

// ═══════════════════════════════════════════════════════════════════════════
function Dashboard({ records, onAdd }) {
  const total      = records.length;
  const abiertos   = records.filter(r => ["Pendiente","En proceso"].includes(r.estadoGarantia)).length;
  const totEnvio   = records.reduce((s,r) => s + (Number(r.costoEnvio)||0), 0);
  const reclamosML = records.filter(r => r.reclamoML === "Sí").length;
  const byStatus   = STATUSES.map(s => ({ name: s, value: records.filter(r=>r.estadoGarantia===s).length, ...STATUS_CFG[s] }));
  const byPlatform = PLATFORMS.map(p => ({ name: p, value: records.filter(r=>r.plataforma===p).length })).filter(x=>x.value>0);
  const recientes  = [...records].filter(r=>["Pendiente","En proceso"].includes(r.estadoGarantia)).sort((a,b)=>(b.fechaProblema||"").localeCompare(a.fechaProblema||"")).slice(0,5);

  const cards = [
    { label: "Casos Totales",  val: total,           icon: "📋", c: "#0F172A", bg: "#F8FAFC" },
    { label: "Abiertos",       val: abiertos,        icon: "🔓", c: "#B45309", bg: "#FFFBEB" },
    { label: "Costo Envíos",   val: fmtMoney(totEnvio), icon: "📦", c: "#6D28D9", bg: "#F5F3FF" },
    { label: "Reclamos ML",    val: reclamosML,      icon: "⚠️", c: "#BE123C", bg: "#FFF1F2" },
  ];

  return <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:14 }}>
      {cards.map(c=><div key={c.label} style={{ background:c.bg, borderRadius:14, padding:"18px 20px", border:"1px solid #E2E8F0", display:"flex", gap:14, alignItems:"center" }}>
        <div style={{ fontSize:26 }}>{c.icon}</div>
        <div>
          <div style={{ fontSize:24, fontWeight:900, color:c.c, lineHeight:1 }}>{c.val}</div>
          <div style={{ fontSize:10, color:"#94A3B8", fontWeight:700, marginTop:4, textTransform:"uppercase", letterSpacing:".05em" }}>{c.label}</div>
        </div>
      </div>)}
    </div>

    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
      <div style={{ background:"#fff", borderRadius:14, padding:"20px 22px", border:"1px solid #E2E8F0" }}>
        <h3 style={{ margin:"0 0 18px", fontSize:13, fontWeight:800, color:"#0F172A" }}>Por Estado</h3>
        {byStatus.map(({name,value,dot})=>{
          const pct = total ? Math.round((value/total)*100) : 0;
          return <div key={name} style={{ marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:12, color:"#475569", fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ width:7,height:7,borderRadius:"50%",background:dot,display:"inline-block" }} />{name}
              </span>
              <span style={{ fontSize:12, fontWeight:800, color:"#0F172A" }}>{value}</span>
            </div>
            <div style={{ height:5, background:"#F1F5F9", borderRadius:99 }}>
              <div style={{ height:"100%", width:`${pct}%`, background:dot, borderRadius:99, transition:"width .5s" }} />
            </div>
          </div>;
        })}
      </div>

      <div style={{ background:"#fff", borderRadius:14, padding:"20px 22px", border:"1px solid #E2E8F0" }}>
        <h3 style={{ margin:"0 0 16px", fontSize:13, fontWeight:800, color:"#0F172A" }}>Por Plataforma</h3>
        {byPlatform.length===0
          ? <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:120,color:"#CBD5E1" }}><span style={{fontSize:30}}>📭</span><span style={{fontSize:12,marginTop:8}}>Sin datos aún</span></div>
          : (()=>{ const mx=Math.max(...byPlatform.map(p=>p.value),1); const CO={"Mercado Libre":"#2563EB","Fravega":"#DC2626","TiendaNube":"#7C3AED","Venta Directa":"#0891B2"};
              return <div style={{display:"flex",flexDirection:"column",gap:13,paddingTop:4}}>
                {byPlatform.map(p=><div key={p.name}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:12,color:"#475569",fontWeight:600}}>{PLATFORM_CFG[p.name]?.icon} {p.name}</span>
                    <span style={{fontSize:12,fontWeight:800,color:"#0F172A"}}>{p.value}</span>
                  </div>
                  <div style={{height:8,background:"#F1F5F9",borderRadius:99}}>
                    <div style={{height:"100%",width:`${(p.value/mx)*100}%`,background:CO[p.name]||"#2563EB",borderRadius:99,transition:"width .5s"}} />
                  </div>
                </div>)}

    <div style={{ background:"#fff", borderRadius:14, padding:"20px 22px", border:"1px solid #E2E8F0" }}>

      </div>
      {recientes.length===0
        ? <div style={{ textAlign:"center",padding:"30px 0",color:"#CBD5E1" }}><div style={{fontSize:36}}>✅</div><p style={{fontSize:13,margin:"8px 0 0"}}>{total===0?"No hay casos cargados todavía":"¡Sin casos abiertos! Todo al día."}</p></div>
        : <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr>{["Cliente","Plataforma","Problema","Estado","Días","ML"].map(h=><th key={h} style={{textAlign:"left",padding:"6px 10px",fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".07em",borderBottom:"2px solid #F1F5F9"}}>{h}</th>)}</tr></thead>
            <tbody>{recientes.map(r=>{
              const d = diasAbierto(r.fechaProblema,r.estadoGarantia);
              return <tr key={r.id} style={{borderBottom:"1px solid #F8FAFC"}}>
                <td style={{padding:"10px",fontSize:13,fontWeight:700,color:"#0F172A"}}>{r.nombreCliente}</td>
                <td style={{padding:"10px"}}><span style={{fontSize:11,padding:"2px 7px",borderRadius:4,background:"#F1F5F9",fontWeight:700,color:"#475569"}}>{PLATFORM_CFG[r.plataforma]?.icon} {r.plataforma?.split(" ")[0]}</span></td>
                <td style={{padding:"10px",fontSize:12,color:"#64748B",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.descripcionProblema||"—"}</td>
                <td style={{padding:"10px"}}><Badge status={r.estadoGarantia} /></td>
                <td style={{padding:"10px",fontSize:12,fontWeight:700,color:d>7?"#EF4444":d>3?"#F59E0B":"#22C55E"}}>{d==null?"—":`${d}d`}</td>

              </tr>;
            })}</tbody>
          </table>}
    </div>
  </div>;
}

//  TABLA DE REGISTROS
// ═══════════════════════════════════════════════════════════════════════════
function Records({ records, onEdit, onDelete, onAdd }) {
  const [search,setSearch]=useState(""); const [fPlat,setFPlat]=useState("");
  const [fStat,setFStat]=useState(""); const [fFrom,setFFrom]=useState(""); const [fTo,setFTo]=useState("");
  const [expanded,setExpanded]=useState(null);

  const filtered = useMemo(()=>{
    const q=search.toLowerCase();
    return records.filter(r=>{
      if(q && !r.nombreCliente?.toLowerCase().includes(q) && !r.idVenta?.toLowerCase().includes(q) && !r.sku?.toLowerCase().includes(q) && !r.mail?.toLowerCase().includes(q)) return false;
      if(fPlat && r.plataforma!==fPlat) return false;
      if(fStat && r.estadoGarantia!==fStat) return false;
      if(fFrom && r.fechaProblema && r.fechaProblema<fFrom) return false;
      if(fTo && r.fechaProblema && r.fechaProblema>fTo) return false;
      return true;
    });
  },[records,search,fPlat,fStat,fFrom,fTo]);

  const exportXLSX = () => {
    const rows = records.map((r,i)=>({ "N°":i+1,"Plataforma":r.plataforma,"Cliente":r.nombreCliente,"ID Venta":r.idVenta,"Fecha Venta":fmtDate(r.fechaVenta),"Fecha Problema":fmtDate(r.fechaProblema),"Descripción":r.descripcionProblema,"Estado":r.estadoGarantia,"Acción Tomada":r.accionTomada,"Costo Envío":Number(r.costoEnvio)||0,"Precio Producto":Number(r.precioProducto)||0,"Dirección":r.direccion,"CP":r.codigoPostal,"Teléfono":r.telefono,"Mail":r.mail,"Reclamo ML":r.reclamoML,"SKU":r.sku,"Notas":r.notas }));
    const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Garantías");
    XLSX.writeFile(wb,`garantias_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const fs={...inputCls,fontSize:12,padding:"7px 10px"};
  const hasF=search||fPlat||fStat||fFrom||fTo;
  const clearF=()=>{setSearch("");setFPlat("");setFStat("");setFFrom("");setFTo("");};

  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E2E8F0",display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <input style={{...fs,flex:"1 1 200px"}} placeholder="🔍  Buscar por cliente, ID, SKU o email…" value={search} onChange={e=>setSearch(e.target.value)} />
        <select style={{...fs,flex:"0 0 165px"}} value={fPlat} onChange={e=>setFPlat(e.target.value)}><option value="">Todas las plataformas</option>{PLATFORMS.map(p=><option key={p}>{p}</option>)}</select>
        <select style={{...fs,flex:"0 0 150px"}} value={fStat} onChange={e=>setFStat(e.target.value)}><option value="">Todos los estados</option>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
        <input type="date" style={{...fs,flex:"0 0 140px"}} value={fFrom} onChange={e=>setFFrom(e.target.value)} title="Desde" />
        <input type="date" style={{...fs,flex:"0 0 140px"}} value={fTo} onChange={e=>setFTo(e.target.value)} title="Hasta" />
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:"#94A3B8"}}><b style={{color:"#0F172A"}}>{filtered.length}</b> caso{filtered.length!==1?"s":""}{hasF&&<> de <b style={{color:"#0F172A"}}>{records.length}</b></>}</span>
          {hasF&&<button onClick={clearF} style={{fontSize:11,color:"#3B82F6",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Limpiar ✕</button>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={exportXLSX} style={{padding:"7px 14px",borderRadius:8,border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📥 Exportar Excel</button>
          <button onClick={onAdd} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"#2563EB",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Nueva Garantía</button>
        </div>
      </div>
    </div>

    {filtered.length===0
      ? <div style={{textAlign:"center",padding:"70px 20px",color:"#CBD5E1",background:"#fff",borderRadius:14,border:"1px solid #E2E8F0"}}>
          <div style={{fontSize:44,marginBottom:12}}>📭</div>
          <p style={{fontSize:14,margin:0,fontWeight:600}}>{records.length===0?"No hay casos registrados todavía":"Sin resultados para estos filtros"}</p>
          {records.length===0&&<button onClick={onAdd} style={{marginTop:16,padding:"10px 20px",borderRadius:9,border:"none",background:"#2563EB",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Agregar primer caso</button>}
        </div>
      : <div style={{background:"#fff",borderRadius:14,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#F8FAFC"}}>{["","#","Cliente","Plataforma","ID Venta","F. Problema","Estado","Días","Reclamo ML","Acciones"].map((h,i)=><th key={i} style={{textAlign:"left",padding:"11px 12px",fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".07em",borderBottom:"1px solid #F1F5F9",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>
              {filtered.map((r,idx)=>{
                const d=diasAbierto(r.fechaProblema,r.estadoGarantia); const exp=expanded===r.id;
                return <Fragment key={r.id}>
                  <tr style={{borderBottom:"1px solid #F8FAFC",background:exp?"#F8FAFC":"transparent",cursor:"pointer"}}
                    onMouseEnter={e=>{if(!exp)e.currentTarget.style.background="#FAFBFC";}}
                    onMouseLeave={e=>{if(!exp)e.currentTarget.style.background="transparent";}}>
                    <td style={{padding:"0 6px 0 12px",width:20}}><button onClick={()=>setExpanded(exp?null:r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E1",fontSize:14,padding:"10px 0",lineHeight:1}}>{exp?"▾":"▸"}</button></td>
                    <td style={{padding:"12px 10px",fontSize:11,color:"#CBD5E1",fontWeight:700}}>{idx+1}</td>
                    <td style={{padding:"12px 10px"}}><div style={{fontSize:13,fontWeight:700,color:"#0F172A"}}>{r.nombreCliente}</div>{r.sku&&<div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{r.sku}</div>}</td>
                    <td style={{padding:"12px 10px"}}><span style={{fontSize:11,padding:"3px 8px",borderRadius:5,background:"#F1F5F9",fontWeight:700,color:"#475569"}}>{PLATFORM_CFG[r.plataforma]?.icon} {r.plataforma||"—"}</span></td>
                    <td style={{padding:"12px 10px",fontSize:12,color:"#64748B",fontFamily:"monospace"}}>{r.idVenta||"—"}</td>
                    <td style={{padding:"12px 10px",fontSize:12,color:"#64748B"}}>{fmtDate(r.fechaProblema)}</td>
                    <td style={{padding:"12px 10px"}}><Badge status={r.estadoGarantia} /></td>
                    <td style={{padding:"12px 10px"}}>{d===null?<span style={{color:"#E2E8F0"}}>—</span>:d==="cerrado"?<span style={{color:"#22C55E",fontSize:11,fontWeight:700}}>✓</span>:<span style={{fontWeight:800,fontSize:13,color:d>7?"#EF4444":d>3?"#F59E0B":"#22C55E"}}>{d}d</span>}</td>
                    <td style={{padding:"12px 10px"}}>{r.reclamoML==="Sí"?<span style={{color:"#EF4444",fontSize:12,fontWeight:700}}>⚠️ Sí</span>:r.reclamoML==="No"?<span style={{color:"#22C55E",fontSize:12}}>✓ No</span>:<span style={{color:"#CBD5E1",fontSize:12}}>N/A</span>}</td>
                    <td style={{padding:"12px 10px"}}><div style={{display:"flex",gap:6}}><button onClick={()=>onEdit(r)} style={{padding:"4px 10px",borderRadius:6,border:"1.5px solid #E2E8F0",background:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",color:"#475569",fontFamily:"inherit"}}>Editar</button><button onClick={()=>onDelete(r.id)} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #FFE4E6",background:"#FFF5F5",fontSize:11,fontWeight:700,cursor:"pointer",color:"#F43F5E",fontFamily:"inherit"}}>✕</button></div></td>
                  </tr>
                  {exp&&<tr><td colSpan={10} style={{background:"#F8FAFC",padding:"16px 20px 18px 44px",borderBottom:"2px solid #E2E8F0"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
                      {[["📝 Descripción",r.descripcionProblema],["🔧 Acción Tomada",r.accionTomada],["📦 Costo Envío",fmtMoney(r.costoEnvio)],["💰 Precio Producto",fmtMoney(r.precioProducto)],["📍 Dirección",r.direccion],["🏷️ CP",r.codigoPostal],["📞 Teléfono",r.telefono],["✉️ Email",r.mail],["📅 Fecha Venta",fmtDate(r.fechaVenta)],["🗒️ Notas",r.notas]].filter(([,v])=>v&&v!=="—").map(([k,v])=><div key={k}><div style={{fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{k}</div><div style={{fontSize:13,color:"#374151",lineHeight:1.4}}>{v}</div></div>)}
                    </div>
                  </td></tr>}
                </Fragment>;
              })}
            </tbody>
          </table>
        </div>}
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════
function MainApp({ user, onLogout }) {
  const [records,setRecords]=useState([]); const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("dashboard"); const [modal,setModal]=useState(null); const [delId,setDelId]=useState(null);
  const [sync,setSync]=useState("");          // "" | "saving" | "ok" | "error"
  const [connErr,setConnErr]=useState("");

  const refresh = useCallback(async () => {
    if (!API_OK) { setConnErr("backend"); setLoaded(true); return; }
    try { const d = await apiList(); setRecords(d); setConnErr(""); }
    catch (e) {
      if (e.message === "SESSION_EXPIRED") { onLogout(); return; }
      setConnErr(e.message || "No se pudo conectar");
    }
    finally { setLoaded(true); }
  }, [onLogout]);

  useEffect(()=>{ refresh(); },[refresh]);

  const flash = s => { setSync(s); if (s==="ok"||s==="error") setTimeout(()=>setSync(""), 2200); };

  const handleSave = async form => {
    const m = modal; setModal(null);
    if (m.mode === "add") {
      const rec = { ...EMPTY_FORM, ...form, id: genId(), createdAt: new Date().toISOString(), addedBy: user.email };
      setRecords(p => [...p, rec]); flash("saving");
      try { await apiCall({ action:"add", record: rec }); flash("ok"); }
      catch (e) { if (e.message==="SESSION_EXPIRED") return onLogout(); flash("error"); refresh(); }
    } else {
      const rec = { ...m.data, ...form };
      setRecords(p => p.map(r => r.id===rec.id ? rec : r)); flash("saving");
      try { await apiCall({ action:"update", record: rec }); flash("ok"); }
      catch (e) { if (e.message==="SESSION_EXPIRED") return onLogout(); flash("error"); refresh(); }
    }
  };

  const handleDelete = async id => {
    setDelId(null);
    const backup = records;
    setRecords(p => p.filter(r => r.id !== id)); flash("saving");
    try { await apiCall({ action:"delete", id }); flash("ok"); }
    catch (e) { if (e.message==="SESSION_EXPIRED") return onLogout(); flash("error"); setRecords(backup); }
  };

  const openCount=records.filter(r=>["Pendiente","En proceso"].includes(r.estadoGarantia)).length;

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#94A3B8",gap:10}}><span>⏳</span>Conectando con la base de datos…</div>;

  return <>
    <header style={{background:"#0C1526",height:58,padding:"0 24px",display:"flex",alignItems:"center",gap:28,position:"sticky",top:0,zIndex:200,boxShadow:"0 1px 0 rgba(255,255,255,.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
        <span style={{fontSize:20}}>🛡️</span>
        <span style={{fontWeight:900,fontSize:15,color:"#fff",letterSpacing:"-.025em"}}>GarantApp</span>
        <span style={{fontSize:10,color:"#475569",fontWeight:700,background:"#1A2535",padding:"2px 7px",borderRadius:4}}>bitek</span>
      </div>

      <nav style={{display:"flex",gap:2}}>
        {[{id:"dashboard",label:"Dashboard",icon:"📊"},{id:"records",label:"Casos",icon:"📋",badge:records.length||null}].map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)} style={{padding:"5px 13px",borderRadius:7,border:"none",background:view===n.id?"#1D3461":"transparent",color:view===n.id?"#60A5FA":"#64748B",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
            {n.icon} {n.label}
            {n.badge&&<span style={{background:"#2563EB",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:800}}>{n.badge}</span>}
          </button>
        ))}
      </nav>

      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
        {/* Indicador de sincronización */}
        {sync==="saving"&&<span style={{fontSize:11,color:"#60A5FA",fontWeight:700}}>⟳ Guardando…</span>}
        {sync==="ok"&&<span style={{fontSize:11,color:"#22C55E",fontWeight:700}}>✓ Guardado</span>}
        {sync==="error"&&<span style={{fontSize:11,color:"#F43F5E",fontWeight:700}}>✕ Error al guardar</span>}

        <button onClick={refresh} title="Refrescar datos del equipo" style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:15,padding:"4px 6px"}} onMouseEnter={e=>e.target.style.color="#94A3B8"} onMouseLeave={e=>e.target.style.color="#475569"}>⟳</button>

        {openCount>0&&<span style={{fontSize:11,color:"#F59E0B",fontWeight:700,background:"rgba(245,158,11,.1)",padding:"4px 10px",borderRadius:20}}>⚠️ {openCount} abierto{openCount>1?"s":""}</span>}
        <button onClick={()=>setModal({mode:"add"})} style={{padding:"8px 17px",borderRadius:8,border:"none",background:"#2563EB",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>+ Nueva Garantía</button>

        {/* User avatar */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:4,paddingLeft:16,borderLeft:"1px solid rgba(255,255,255,.08)"}}>
          {user.picture
            ? <img src={user.picture} alt="" style={{width:30,height:30,borderRadius:"50%",border:"2px solid rgba(255,255,255,.15)"}} />
            : <div style={{width:30,height:30,borderRadius:"50%",background:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:800}}>{user.name?.[0]||"?"}</div>}
          <div style={{lineHeight:1.2}}>
            <div style={{fontSize:12,fontWeight:700,color:"#E2E8F0"}}>{user.name?.split(" ")[0]}</div>
            <div style={{fontSize:10,color:"#475569"}}>{user.email}</div>
          </div>
          <button onClick={onLogout} title="Cerrar sesión" style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:14,padding:"4px 6px",borderRadius:6}} onMouseEnter={e=>e.target.style.color="#94A3B8"} onMouseLeave={e=>e.target.style.color="#475569"}>
            ⏏
          </button>
        </div>
      </div>
    </header>

    <main style={{maxWidth:1240,margin:"0 auto",padding:"26px 20px"}}>
      {connErr&&<div style={{marginBottom:18,padding:"12px 16px",borderRadius:10,background:connErr==="backend"?"#FFFBEB":"#FFF1F2",border:`1px solid ${connErr==="backend"?"#FDE68A":"#FECDD3"}`,fontSize:13,color:connErr==="backend"?"#B45309":"#BE123C"}}>
        {connErr==="backend"
          ? <>⚙️ <b>Backend sin configurar.</b> Pegá la URL del Apps Script en <code>CONFIG.WEBAPP_URL</code> para activar el guardado compartido. Por ahora los datos no se persisten.</>
          : <>⚠️ <b>No se pudo conectar con la base de datos.</b> {connErr} — Verificá la URL del Apps Script y que esté publicado con acceso "Cualquier usuario". <button onClick={refresh} style={{marginLeft:8,fontSize:12,fontWeight:700,color:"#BE123C",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Reintentar</button></>}
      </div>}
      <div style={{marginBottom:22}}>
        <h1 style={{margin:0,fontSize:21,fontWeight:900,color:"#0F172A",letterSpacing:"-.025em"}}>{view==="dashboard"?"📊 Dashboard":"📋 Registros de Garantías"}</h1>
        <p style={{margin:"4px 0 0",fontSize:12,color:"#94A3B8"}}>{view==="dashboard"?`${records.length} caso${records.length!==1?"s":""} en total`:"Buscá, filtrá y gestioná todos los casos"}</p>
      </div>
      {view==="dashboard"&&<Dashboard records={records} onAdd={()=>setModal({mode:"add"})} />}
      {view==="records"&&<Records records={records} onEdit={r=>setModal({mode:"edit",data:r})} onDelete={id=>setDelId(id)} onAdd={()=>setModal({mode:"add"})} />}
    </main>

    {modal&&<Overlay onClose={()=>setModal(null)}><GarantiaForm initial={modal.mode==="edit"?modal.data:null} onSave={handleSave} onClose={()=>setModal(null)} /></Overlay>}
    {delId&&<Overlay onClose={()=>setDelId(null)}>
      <div style={{padding:"44px 36px",textAlign:"center"}}>
        <div style={{fontSize:44,marginBottom:14}}>🗑️</div>
        <h2 style={{margin:"0 0 8px",fontSize:18,fontWeight:800,color:"#0F172A"}}>¿Eliminar este caso?</h2>
        <p style={{margin:"0 0 26px",color:"#64748B",fontSize:14}}>Esta acción no se puede deshacer.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>setDelId(null)} style={{padding:"10px 22px",borderRadius:9,border:"1.5px solid #E2E8F0",background:"#fff",color:"#64748B",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
          <button onClick={()=>handleDelete(delId)} style={{padding:"10px 22px",borderRadius:9,border:"none",background:"#EF4444",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Sí, eliminar</button>
        </div>
      </div>
    </Overlay>}
  </>;
}

// ═══════════════════════════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  useEffect(()=>{
    const l=document.createElement("link");
    l.href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap";
    l.rel="stylesheet"; document.head.appendChild(l);
  },[]);

  return (
    <div style={{minHeight:"100vh",background:"#F0F4F8",fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <AuthGate>
        {({user,onLogout})=><MainApp user={user} onLogout={onLogout} />}
      </AuthGate>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
